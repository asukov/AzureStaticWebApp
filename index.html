<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWA Entra ID SSO Demo</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f4f6f9; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        .btn { display: inline-block; background-color: #0078d4; color: white; padding: 0.75rem 1.5rem; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 1rem; }
        .btn-logout { background-color: #d83b01; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Welcome to Azure Static Web App</h2>
        <p>This application is secured using Microsoft Entra ID Single Sign-On (SSO).</p>
        <div id="auth-section">
            <p>Checking authentication status...</p>
        </div>
    </div>

    <script>
        // Fetch user information from the SWA built-in Auth endpoint
        async function getUserInfo() {
            try {
                const response = await fetch('/.auth/me');
                const payload = await response.json();
                const { clientPrincipal } = payload;
                const authSection = document.getElementById('auth-section');

                if (clientPrincipal) {
                    authSection.innerHTML = `
                        <p>Logged in as: <strong>${clientPrincipal.userDetails}</strong></p>
                        <a href="/.auth/logout?post_logout_redirect_uri=/" class="btn btn-logout">Sign Out</a>
                    `;
                } else {
                    authSection.innerHTML = `
                        <p>You are not logged in.</p>
                        <a href="/.auth/login/aad" class="btn">Sign in with Microsoft Entra ID</a>
                    `;
                }
            } catch (error) {
                console.error("Error checking auth status", error);
            }
        }
        getUserInfo();
    </script>
</body>
</html>
